name: Android APK

on:
  workflow_dispatch:
    inputs:
      arch:
        description: Android native architecture to package
        required: true
        default: aarch64
        type: choice
        options:
          - aarch64
          - x86_64
          - armv7
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: android-apk-${{ github.ref }}-${{ github.event.inputs.arch || 'aarch64' }}
  cancel-in-progress: true

env:
  ANDROID_COMPILE_SDK: '36'
  ANDROID_BUILD_TOOLS: '36.0.0'
  ANDROID_NDK_VERSION: '29.0.14206865'
  ARCH: ${{ github.event.inputs.arch || 'aarch64' }}
  ANDROID_KEYSTORE_PATH: keystores/clawseed-release.jks
  ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
  ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
  ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

jobs:
  build:
    name: Build APK (${{ github.event.inputs.arch || 'aarch64' }})
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
          targets: aarch64-linux-android,x86_64-linux-android,armv7-linux-androideabi

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          save-if: ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/') }}

      - uses: android-actions/setup-android@v3

      - name: Install Android SDK and NDK
        run: |
          sdkmanager \
            "platforms;android-${ANDROID_COMPILE_SDK}" \
            "build-tools;${ANDROID_BUILD_TOOLS}" \
            "ndk;${ANDROID_NDK_VERSION}"
          echo "ANDROID_NDK_ROOT=${ANDROID_HOME}/ndk/${ANDROID_NDK_VERSION}" >> "${GITHUB_ENV}"

      - uses: actions/cache@v4
        with:
          path: ~/.cache/ort-android
          key: ort-android-1.24.2-${{ env.ARCH }}

      - uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' && !startsWith(github.ref, 'refs/tags/') }}

      - name: Verify bundled embedding model
        shell: bash
        run: |
          MODEL="clients/android/app/src/main/assets/models/gte-multilingual-base/model_int8.onnx"
          TOKENIZER="clients/android/app/src/main/assets/models/gte-multilingual-base/tokenizer.json"

          test -s "${MODEL}"
          test -s "${TOKENIZER}"

          MODEL_SIZE=$(wc -c < "${MODEL}")
          TOKENIZER_SIZE=$(wc -c < "${TOKENIZER}")

          if [[ "${MODEL_SIZE}" -lt 100000000 || "${TOKENIZER_SIZE}" -lt 1000000 ]]; then
            echo "::error::Bundled embedding model files look too small. Git LFS files were likely not downloaded."
            echo "model_int8.onnx=${MODEL_SIZE} bytes"
            echo "tokenizer.json=${TOKENIZER_SIZE} bytes"
            exit 1
          fi

      - name: Install release signing key
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [[ -z "${ANDROID_KEYSTORE_BASE64}" || -z "${ANDROID_KEYSTORE_PASSWORD}" || -z "${ANDROID_KEY_ALIAS}" || -z "${ANDROID_KEY_PASSWORD}" ]]; then
            echo "::error::Release signing secrets are not fully configured."
            echo "Required secrets: ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS, ANDROID_KEY_PASSWORD"
            exit 1
          fi

          mkdir -p clients/android/keystores
          echo "${ANDROID_KEYSTORE_BASE64}" | base64 -d > "clients/android/${ANDROID_KEYSTORE_PATH}"
          chmod 600 "clients/android/${ANDROID_KEYSTORE_PATH}"

      - name: Build native gateway
        run: ./tools/build-clawseed-android.sh "${ARCH}" build

      - name: Build release APK
        working-directory: clients/android
        run: ./gradlew --no-daemon assembleRelease

      - name: Verify APK signature
        run: |
          "${ANDROID_HOME}/build-tools/${ANDROID_BUILD_TOOLS}/apksigner" verify \
            --print-certs \
            clients/android/app/build/outputs/apk/release/app-release.apk

      - name: Resolve APK metadata
        id: apk
        shell: bash
        run: |
          case "${ARCH}" in
            aarch64) ABI="arm64-v8a" ;;
            x86_64) ABI="x86_64" ;;
            armv7) ABI="armeabi-v7a" ;;
            *) echo "Unknown ARCH: ${ARCH}" >&2; exit 1 ;;
          esac

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
            VERSION="${VERSION#V}"
          else
            VERSION=$(sed -n 's/.*versionName = "\([^"]*\)".*/\1/p' clients/android/app/build.gradle.kts | head -n 1)
          fi

          if [[ -z "${VERSION}" ]]; then
            echo "::error::Unable to resolve APK version"
            exit 1
          fi

          APK_NAME="clawseed-${VERSION}-${ABI}.apk"
          echo "abi=${ABI}" >> "${GITHUB_OUTPUT}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "apk_name=${APK_NAME}" >> "${GITHUB_OUTPUT}"

      - name: Prepare APK artifact
        shell: bash
        run: |
          mkdir -p dist
          cp clients/android/app/build/outputs/apk/release/app-release.apk "dist/${{ steps.apk.outputs.apk_name }}"

      - uses: actions/upload-artifact@v4
        with:
          name: clawseed-${{ steps.apk.outputs.version }}-${{ steps.apk.outputs.abi }}-apk
          path: dist/*.apk
          if-no-files-found: error
          retention-days: 14

      - name: Upload APK to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ steps.apk.outputs.apk_name }}
          fail_on_unmatched_files: true
